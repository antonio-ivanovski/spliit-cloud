services:
  migrate:
    build: .
    image: spliit:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-spliit}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-spliit}
    depends_on:
      db:
        condition: service_healthy
    command: ['bun', '--filter', '@spliit/db', 'prisma-migrate']
    networks:
      - spliit_network

  api:
    build: .
    image: spliit:latest
    restart: unless-stopped
    ports:
      - 3001:3001
    env_file:
      - .env
    environment:
      PORT: 3001
      WEB_ORIGINS: ${WEB_ORIGINS:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-spliit}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-spliit}
      PUBLIC_DEFAULT_CURRENCY_CODE: ${PUBLIC_DEFAULT_CURRENCY_CODE:-}
      PUBLIC_ENABLE_EXPENSE_DOCUMENTS: ${PUBLIC_ENABLE_EXPENSE_DOCUMENTS:-false}
      PUBLIC_ENABLE_RECEIPT_EXTRACT: ${PUBLIC_ENABLE_RECEIPT_EXTRACT:-false}
      PUBLIC_ENABLE_CATEGORY_EXTRACT: ${PUBLIC_ENABLE_CATEGORY_EXTRACT:-false}
      S3_UPLOAD_KEY: ${S3_UPLOAD_KEY:-}
      S3_UPLOAD_SECRET: ${S3_UPLOAD_SECRET:-}
      S3_UPLOAD_BUCKET: ${S3_UPLOAD_BUCKET:-}
      S3_UPLOAD_REGION: ${S3_UPLOAD_REGION:-}
      S3_UPLOAD_ENDPOINT: ${S3_UPLOAD_ENDPOINT:-}
      S3_UPLOAD_PUBLIC_URL: ${S3_UPLOAD_PUBLIC_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Better Auth (required in production: BETTER_AUTH_SECRET)
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # SMTP (required in production: SMTP_HOST)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'bun -e "fetch(''http://127.0.0.1:3001/health/readiness'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - spliit_network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spliit}
      POSTGRES_USER: ${POSTGRES_USER:-spliit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - spliit_network

volumes:
  postgres_data:

networks:
  spliit_network:
    driver: bridge
