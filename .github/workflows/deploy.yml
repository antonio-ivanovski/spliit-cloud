name: Server Images
run-name: ${{ github.event.head_commit.message || github.sha }}

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push server images
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            scope: '@spliit/api'
            target: api
            image: spliit-api
          - app: migrate
            scope: '@spliit/db'
            target: migrate
            image: spliit-migrate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        run: |
          image_name="${{ github.repository_owner }}/${{ matrix.image }}"
          echo "name=${image_name,,}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/arm64
          build-args: |
            APP_SCOPE=${{ matrix.scope }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.app }}
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.app }}
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache,mode=max

  deploy-dokploy:
    name: Trigger Dokploy deploy
    needs: build-and-push
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Trigger Dokploy compose deploy
        env:
          DOKPLOY_URL: ${{ vars.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ vars.DOKPLOY_COMPOSE_ID }}
          DOKPLOY_CF_BYPASS_SECRET: ${{ secrets.DOKPLOY_CF_BYPASS_SECRET }}
        run: |
          if [ -z "$DOKPLOY_URL" ] || [ -z "$DOKPLOY_API_KEY" ] || [ -z "$DOKPLOY_COMPOSE_ID" ] || [ -z "$DOKPLOY_CF_BYPASS_SECRET" ]; then
            echo "Dokploy deploy secrets are not fully configured."
            echo "Required values: DOKPLOY_URL, DOKPLOY_COMPOSE_ID, DOKPLOY_API_KEY, DOKPLOY_CF_BYPASS_SECRET."
            exit 1
          fi

          response="$(curl -sS -w '\n%{http_code}' -X POST "${DOKPLOY_URL%/}/api/compose.deploy" \
            -H "accept: application/json" \
            -H "content-type: application/json" \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -H "x-dokploy-ci-token: $DOKPLOY_CF_BYPASS_SECRET" \
            -d "{\"composeId\":\"$DOKPLOY_COMPOSE_ID\"}")"

          status="$(printf '%s' "$response" | tail -n1)"
          body="$(printf '%s' "$response" | sed '$d')"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Dokploy deploy request failed with HTTP $status."
            echo "$body"
            exit 1
          fi

          echo "$body"
