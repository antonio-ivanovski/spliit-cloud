name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  checks:
    runs-on: ubuntu-24.04-arm
    env:
      DATABASE_URL: postgresql://postgres:1234@localhost
      NEXT_PUBLIC_DEFAULT_CURRENCY_CODE: USD

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1234
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        # Wait for postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bun run prisma-generate

      - name: Check TypeScript types
        run: bun run check-types

      - name: Check ESLint
        run: bun run lint

      - name: Check Prettier formatting
        run: bun run check-formatting

      - name: Audit translations
        run: bun i18n check

      - name: Run Prisma migrations
        run: bun run prisma-migrate

      - name: Run tests
        run: bun run test

      - name: Run integration tests
        run: |
          set -e

          # Web integration tests probe http://localhost:3001/health at
          # module load time and throw if the API is not running, so we
          # start the API server here and wait for it to respond.
          echo "Starting API server in the background..."
          bun --filter @spliit/api start > /tmp/api-server.log 2>&1 &
          API_PID=$!

          cleanup() {
            kill "$API_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          echo "Waiting for API server on http://localhost:3001/health..."
          for i in {1..60}; do
            if curl -s -f http://localhost:3001/health > /dev/null; then
              echo "API server is ready after ${i}s"
              break
            fi
            sleep 1
          done

          if ! curl -s -f http://localhost:3001/health > /dev/null; then
            echo "::error::API server failed to become ready within 60s"
            echo "--- API server log ---"
            cat /tmp/api-server.log
            exit 1
          fi

          bun run test:integration

      - name: Build
        run: bun run build
