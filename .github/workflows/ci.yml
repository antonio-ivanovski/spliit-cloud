name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  checks:
    runs-on: ubuntu-24.04-arm
    env:
      DATABASE_URL: postgresql://postgres:1234@localhost
      NEXT_PUBLIC_DEFAULT_CURRENCY_CODE: USD

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1234
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        # Wait for postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bun run prisma-generate

      - name: Check TypeScript types
        run: bun run check-types

      - name: Check ESLint
        run: bun run lint

      - name: Check Prettier formatting
        run: bun run check-formatting

      - name: Run Prisma migrations
        run: bun run prisma-migrate

      - name: Run tests
        run: bun run test

      - name: Run integration tests
        run: bun run test:integration
        continue-on-error: true  # integration tests are optional (DB-dependent)

      - name: Build
        run: bun run build
