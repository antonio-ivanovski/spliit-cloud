services:
  migrate:
    image: ghcr.io/antonio-ivanovski/spliit-cloud-migrate:latest
    pull_policy: always
    restart: 'no'
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - dokploy-network

  api:
    image: ghcr.io/antonio-ivanovski/spliit-cloud-api:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    ports:
      - 3001:3001
    environment:
      PORT: 3001
      WEB_ORIGINS: ${WEB_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      PUBLIC_DEFAULT_CURRENCY_CODE: ${PUBLIC_DEFAULT_CURRENCY_CODE:-}
      PUBLIC_ENABLE_EXPENSE_DOCUMENTS: ${PUBLIC_ENABLE_EXPENSE_DOCUMENTS:-false}
      PUBLIC_ENABLE_RECEIPT_EXTRACT: ${PUBLIC_ENABLE_RECEIPT_EXTRACT:-false}
      PUBLIC_ENABLE_CATEGORY_EXTRACT: ${PUBLIC_ENABLE_CATEGORY_EXTRACT:-false}
      S3_UPLOAD_KEY: ${S3_UPLOAD_KEY:-}
      S3_UPLOAD_SECRET: ${S3_UPLOAD_SECRET:-}
      S3_UPLOAD_BUCKET: ${S3_UPLOAD_BUCKET:-}
      S3_UPLOAD_REGION: ${S3_UPLOAD_REGION:-}
      S3_UPLOAD_ENDPOINT: ${S3_UPLOAD_ENDPOINT:-}
      S3_UPLOAD_PUBLIC_URL: ${S3_UPLOAD_PUBLIC_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Better Auth (required: BETTER_AUTH_SECRET)
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      # SMTP (required: SMTP_HOST)
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST must be set}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:?EMAIL_FROM must be set}
    networks:
      - dokploy-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'bun -e "fetch(''http://127.0.0.1:3001/health/readiness'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

networks:
  dokploy-network:
    external: true
